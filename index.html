<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jackson Collins</title>
  <meta name="description" content="Jackson Collins — personal site and projects.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1612;
      color: #e8dfc8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    main { width: 100%; max-width: 560px; text-align: center; }

    h1 {
      font-size: 2.6rem;
      letter-spacing: 0.05em;
      color: #f0e6c8;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 0.9rem;
      color: #8a7d65;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .projects { display: flex; flex-direction: column; gap: 1rem; }

    a.project-card {
      display: block;
      background: #242018;
      border: 1px solid #3a3228;
      border-radius: 8px;
      padding: 1.4rem 1.6rem;
      text-decoration: none;
      color: inherit;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    a.project-card:hover {
      border-color: #6b5a3e;
      background: #2a251c;
    }

    .project-title {
      font-size: 1.2rem;
      color: #f0e6c8;
      margin-bottom: 0.3rem;
    }
    .project-title .arrow { color: #6b5a3e; font-size: 1rem; }

    .project-desc {
      font-size: 0.85rem;
      color: #8a7d65;
      line-height: 1.5;
    }

    footer {
      margin-top: 3.5rem;
      font-size: 0.75rem;
      color: #5a4e38;
      letter-spacing: 0.08em;
    }
    footer a { color: #8a7d65; text-decoration: none; }
    footer a:hover { color: #e8dfc8; }
  </style>
</head>
<body>
<main>
  <h1>Jackson Collins</h1>
  <p class="tagline">Projects &amp; Tools</p>

  <div class="projects">
    <a class="project-card" href="eartrain/">
      <div class="project-title">EarTrain — Old Time <span class="arrow">→</span></div>
      <div class="project-desc">
        An ear-training tool for old-time fiddle tunes. Transcribe melodies in
        scale-degree notation and play them back — keys, modes, tempos, and
        fiddle or banjo tones.
      </div>
    </a>
  </div>

  <footer>
    <a href="mailto:jcollins1119@gmail.com">jcollins1119@gmail.com</a>
  </footer>
</main>
</body>
</html>
